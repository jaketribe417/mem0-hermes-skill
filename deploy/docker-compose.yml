services:
  mem0:
    build:
      context: ./deploy
      dockerfile: Dockerfile
    image: mem0-app:patched-v2.0.4
    environment:
      OPENAI_API_KEY: '${OPENAI_API_KEY}'
      OLLAMA_CLOUD_API_KEY: '${OLLAMA_CLOUD_API_KEY}'
      MEM0_DEFAULT_LLM_MODEL: 'gpt-oss:20b-cloud'
      MEM0_DEFAULT_EMBEDDER_MODEL: text-embedding-3-small
      POSTGRES_HOST: postgres
      POSTGRES_PORT: '5432'
      POSTGRES_DB: mem0
      POSTGRES_USER: mem0user
      POSTGRES_PASSWORD: '${POSTGRES_PASSWORD}'
      POSTGRES_COLLECTION_NAME: memories
      JWT_SECRET: '${JWT_SECRET}'
      ADMIN_API_KEY: '${ADMIN_API_KEY}'
      AUTH_DISABLED: 'false'
      DASHBOARD_URL: 'https://mem0.jhostly.com'
      APP_DB_NAME: mem0
      MEM0_TELEMETRY: 'false'
    expose:
      - '8000'
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - 'mem0_history:/app/history'
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'curl', '-sf', 'http://localhost:8000/__build__']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - mem0_network

  postgres:
    image: 'ankane/pgvector:v0.5.1'
    restart: on-failure
    shm_size: 128mb
    environment:
      POSTGRES_USER: mem0user
      POSTGRES_PASSWORD: '${POSTGRES_PASSWORD}'
      POSTGRES_DB: mem0
    healthcheck:
      test: ['CMD', 'pg_isready', '-q', '-d', 'mem0', '-U', 'mem0user']
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - 'mem0_pgdata_v2:/var/lib/postgresql/data'
    networks:
      - mem0_network

  mem0-dashboard:
    build:
      context: ./deploy
      dockerfile: dashboard.Dockerfile
    image: mem0-dashboard:built
    environment:
      NEXT_PUBLIC_API_URL: 'https://mem0api.jhostly.com'
      API_INTERNAL_URL: 'http://mem0:8000'
      NEXT_PUBLIC_INSTANCE_NAME: Mem0
    expose:
      - '3000'
    depends_on:
      - mem0
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'curl', '-sf', 'http://localhost:3000/login']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - mem0_network

volumes:
  mem0_pgdata_v2:
  mem0_history:

networks:
  mem0_network:
    name: mem0_network
    external: false